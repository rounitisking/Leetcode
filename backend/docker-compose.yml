version: "3"

services:
db:
  image: postgres:13
  restart: always
  environment:
    POSTGRES_USER: judge0
    POSTGRES_PASSWORD: judge0
    POSTGRES_DB: judge0
  volumes:
    - data:/var/lib/postgresql/data

redis:
image: redis:7
restart: always

server:
image: judge0/judge0:latest
restart: always
ports:
- "2358:2358"
environment:
REDIS_HOST: redis
POSTGRES_HOST: db
POSTGRES_DB: judge0
POSTGRES_USER: judge0
POSTGRES_PASSWORD: judge0
depends_on:
- db
- redis

worker:
image: judge0/judge0:latest
restart: always
environment:
REDIS_HOST: redis
POSTGRES_HOST: db
POSTGRES_DB: judge0
POSTGRES_USER: judge0
POSTGRES_PASSWORD: judge0
depends_on:
- db
- redis

volumes:
data:
